# Configuração do túnel da Sementeira, para rodar no PC servidor.
#
# Copie este arquivo para  C:\Users\<SEU-USUARIO>\.cloudflared\config.yml
# no PC servidor e ajuste as duas linhas marcadas com <-- TROCAR.
#
# O túnel "sementeira" já foi criado (id 0c10d031-1b13-4fd6-839a-db961f8ed040).
# Este PC não cria nada — só RODA o túnel existente, usando o arquivo de
# credencial que você copiou para a pasta .cloudflared.

tunnel: 0c10d031-1b13-4fd6-839a-db961f8ed040
credentials-file: C:\Users\<SEU-USUARIO>\.cloudflared\0c10d031-1b13-4fd6-839a-db961f8ed040.json   # <-- TROCAR <SEU-USUARIO>

ingress:
  # Todo tráfego de app.sementeiraprojetos.com.br vai para o servidor Node
  # rodando NESTE mesmo PC, na porta 7010.
  - hostname: app.sementeiraprojetos.com.br
    service: http://127.0.0.1:7010
  # Regra final obrigatória: qualquer outra coisa recebe 404.
  - service: http_status:404
