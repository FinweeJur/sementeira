name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Build installer
        run: npm run dist

      - name: Get version from tag
        id: tag_name
        run: |
          $version = "${{ github.ref }}".Replace('refs/tags/', '')
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_name.outputs.version }}
          name: Sementeira ${{ steps.tag_name.outputs.version }}
          files: |
            release/Sementeira*.exe
          draft: false
          prerelease: false
          body: |
            ## 📦 Release Assets
            - **Sementeira Setup** — Instalador Windows (.exe)

            ## 📝 Notas
            Para instalar, baixe o `.exe` e execute. A aplicação instalará todos os arquivos necessários.

            ---
            **Build automático via GitHub Actions**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sementeira-build-${{ steps.tag_name.outputs.version }}
          path: release/
          retention-days: 30
