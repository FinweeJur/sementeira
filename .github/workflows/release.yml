name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Build installer and publish to GitHub Releases
        # --publish always faz o electron-builder publicar TODOS os artefatos
        # no release da tag automaticamente: .exe + latest.yml + .blockmap.
        # latest.yml é o manifest que o electron-updater lê pra checar versão nova.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --publish always

      - name: Get version from tag
        id: tag_name
        run: |
          $version = "${{ github.ref }}".Replace('refs/tags/', '')
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Upload build artifacts (debug)
        uses: actions/upload-artifact@v4
        with:
          name: sementeira-build-${{ steps.tag_name.outputs.version }}
          path: |
            release/
            !release/win-unpacked*
          retention-days: 30
